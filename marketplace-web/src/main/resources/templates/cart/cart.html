<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Cart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
</head>
<body>
<!--Header-->
    <header th:insert="blocks/header :: header"></header>

<!--Main layout-->
    <main>
        <div class="container">

            <!--Section: Block Content-->
            <section class="mt-5 mb-4">

                <!--Grid row-->
                <div class="row">

                    <!--Grid column-->
                    <div class="col-lg-8">

                        <!-- Card -->
                        <div class="card wish-list mb-4">
                            <div class="card-body">

                                <h5 class="mb-4">Cart (<span th:text="${cartCount}">2</span> items)</h5>

                                <div class="row mb-4" th:each="item, iStat : ${cart}">
                                    <div class="col-md-5 col-lg-3 col-xl-3">
                                        <div class="mb-3 mb-md-0">
                                            <img class="mt-5" src="" th:src="@{${'/files/' + item.imageName}}"
                                                 height="300px" width="auto" alt=""/>
                                        </div>
                                    </div>
                                    <div class="col-md-7 col-lg-9 col-xl-9">
                                        <div>
                                            <div class="d-flex justify-content-between">
                                                <div>
                                                    <h5 th:text="${item.name}">Blue denim shirt</h5>
                                                    <p class="mb-3 text-uppercase small">Weight: <span th:text="${item.weight}"></span> grams</p>
                                                </div>

                                            </div>
                                            <div class="mt-5 d-flex justify-content-between align-items-center">
                                                <div>
                                                    <form th:action="@{/cart/{index}(index=${iStat.index})}" th:method="DELETE">
                                                        <button class="card-link-secondary small text-uppercase mr-3 fas fa-trash-alt mr-1">Remove goods</button>
                                                    </form>
                                                </div>
                                                <p class="mb-0"><span><strong>$<span th:text="${item.price}"></span></strong></span></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <hr class="mb-4">

                                <p class="text-primary mb-0"><i class="fas fa-info-circle mr-1"></i>
                                <span th:text="#{donotdelay}"></span>
                                </p>

                            </div>
                        </div>

                    </div>
                    <!--Grid column-->

                    <!--Grid column-->
                    <div class="col-lg-4">

                        <!-- Card -->
                        <div class="card mb-4">
                            <div class="card-body">

                                <h5 class="mb-3" th:text="#{totalamount}"> </h5>

                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 pb-0">
                                        <span th:text="#{amountpayable}"></span>
                                        <span>$<span th:text="${total}"></span></span>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                        <span th:text="#{shipping}"></span>
                                        <span th:text="#{gratis}"></span>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 mb-3">
                                        <div>
                                            <strong th:text="#{totalamount}"></strong>
                                            <strong>
                                                <p class="mb-0" th:text="#{includingVAT}"></p>
                                            </strong>
                                        </div>
                                        <span><strong>$<span th:text="${total}"></span></strong></span>
                                    </li>
                                </ul>
                                <a th:href="@{/order}" class="btn btn-primary btn-block waves-effect waves-light">Order</a>
                            </div>
                        </div>
                        <!-- Card -->

                    </div>
                    <!--Grid column-->

                </div>
                <!--Grid row-->

            </section>
            <!--Section: Block Content-->

        </div>
    </main>
<!--Main layout-->

<!--Footer-->
    <footer th:insert="blocks/footer :: footer"></footer>
</body>
</html>
