<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
</head>
<body>
<!--Header-->
    <header th:insert="blocks/header-login-register :: header"></header>

<!--Main layout-->
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <h2 ALIGN="center" th:text="${message}"></h2>
                <h2 th:text="#{login}"></h2>
                <p th:text="#{fillloginform}"></p>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="email" th:text="#{email}"></label>
                        <input type="email" class="form-control form-control-lg"
                               required minlength="6" maxlength="32" placeholder="some@some.com"
                               name="email" id="email" aria-describedby="emailHelp">
                    </div>

                    <div class="form-group">
                        <label for="password" th:text="#{password}"></label>
                        <input type="password" class="form-control form-control-lg"
                               required minlength="6" maxlength="32" placeholder="Password"
                               name="password" id="password">
                    </div>
                    <div th:if="${param.error}" class="alert alert-error text-danger">
                        Invalid user name or password.
                    </div>
                    <input type="submit" value="Login" class="btn btn-primary btn-block">

                    <br><br>
                    <a class="linkControl" th:href="@{/register}" href="#" th:text="#{noaccount}"></a>

                    <br><br>
                    <a href="" th:href="@{/forgotpassword}">Forgot password ?</a>
                </form>

            </div>
        </div>
    </div>
<!--Main layout-->

<!--Footer-->
    <footer th:insert="blocks/footer-admin :: footer"></footer>
</body>
</html>
