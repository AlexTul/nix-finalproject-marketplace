<div th:fragment="header" xmlns="http://www.w3.org/1999/html">
    <header class="container-fluid site-header sticky-top py-1 card shadow-sm">
        <!--Navbar-->
        <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom">
            <a href="/static" class="d-flex align-items-center text-dark text-decoration-none">
                <a class="navbar-brand" href="#">
                    <img th:src="@{/images/logo.png}" src="" width="auto" height="40"
                         class="d-inline-block align-top" alt=""/>
                </a>
                <span class="fs-4">Market Place</span>
            </a>

            <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
                <div class="me-3 py-2 text-decoration-none">
                    <a th:href="@{'?locale=uk'}">UK</a>
                    <a th:href="@{'?locale=en'}">EN</a>
                </div>
                <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/}" href="#" th:text="#{main}"></a>
                <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/login}" href="#" th:text="#{login}"></a>
                <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/logout}" href="#" th:text="#{logout}"></a>
                <a class="me-3 py-2 text-dark text-decoration-none" th:href="@{/cart}" href="#" th:text="#{cart}"></a>
                <a class="me-3 py-2 text-dark text-decoration-none nav-link" th:text="${cartCount}" href="#"></a>
            </nav>
        </div>
        <!--Navbar-->

        <!--Ekan`s main message-->
        <div class="container">
            <div class="pricing-header p-3 pb-md-4 mx-auto text-center">
                <h2 class="display-4 fw-normal" th:text="#{ekan}"></h2>
                <p class="fs-5 text-muted" th:text="#{ekanmessage}"></p>
            </div>
        </div>
        <!--Ekan`s main message-->
    </header>
</div>
