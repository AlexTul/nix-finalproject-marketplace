<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Categories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
</head>
<body>
<!--Header-->
    <header th:insert="blocks/header-option :: header"></header>

<!--Main message-->
    <div class="jumbotron text-center">
        <h1 class="display-4" th:text="#{categories}"></h1><br>
        <h3 th:text="#{managesection}"></h3>
    </div>

<!--Main layout-->
    <div class="container">
        <a th:href="@{/categories/add}" style="margin: 20px 0" class="btn btn-primary">Add сategory</a>
        <table class="table">
            <thead class="thead-light">
            <tr>
                <th scope="col">SN</th>
                <th scope="col" th:text="#{name}"></th>
                <th scope="col" th:text="#{delete}"></th>
                <th scope="col" th:text="#{update}"></th>
            </tr>
            </thead>
            <tbody>

            <tr th:each="category, iStat : ${categories}">
                <th scope="row" th:text="${iStat.index + 1}">1</th>
                <td th:text="${category.name}">Larry</td>
                <form th:action="@{/admins/categories/{id}(id=${category.id})}" th:method="DELETE">
                    <td><button class="btn btn-danger">Delete</button></td>
                </form>
                <td><a href="" th:href="@{/categories/update/{id}(id=${category.id})}"
                       class="btn btn-warning">Update</a></td>
            </tr>

            <!--Customers pagination-->
            <pagination th:insert="blocks/pager-category :: pager"></pagination>
            <!--Customers pagination-->

            </tbody>
        </table>
    </div>
<!--Main layout-->

<!--Footer-->
    <footer th:insert="blocks/footer-admin :: footer"></footer>
</body>
</html>
