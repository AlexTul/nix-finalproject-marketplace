<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Categories</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
</head>
<body>
<!--Header-->
    <header th:insert="blocks/header-option :: header"></header>

<!--Main layout-->
    <div class="container">
        <h1 th:text="#{updatecategory}"></h1>
        <div class="row">
            <div class="col-sm-4">
                <form th:action="@{/admins/categories/{id}(id=${category.id})}" th:method="PUT" th:object="${category}">
                    <input type="hidden" name="id"  th:field="*{id}">
                    <div class="form-group">
                        <label for="name" th:text="#{name}"></label>
                        <input type="text" class="form-control" required minlength="2" maxlength="30" th:field="*{name}"
                               name="name" id="name" placeholder="Enter name">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
<!--Main layout-->

<!--Footer-->
    <footer th:insert="blocks/footer-admin :: footer"></footer>
</body>
</html>
