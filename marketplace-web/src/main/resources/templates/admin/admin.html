<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
</head>
<body>
<!--Header-->
    <header th:insert="blocks/header-admin :: header"></header>

<!--Main message-->
    <div class="jumbotron text-center">
        <h1 class="display-4" th:text="#{welcomeadmin}"></h1><br><br>
        <h3 th:text="#{messageadmin}"></h3>
    </div>

<!--Main layout-->
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title" th:text="#{categories}"></h4>
                        <p class="card-text" th:text="#{managesection}"></p>
                        <a href="#" th:href="@{/categories}" class="card-link btn btn-primary">Manage</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title" th:text="#{goods}"></h4>
                        <p class="card-text" th:text="#{managesection}"></p>
                        <a href="#" th:href="@{/goods}" class="card-link btn btn-primary">Manage</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-3 pt-3" >
                <div class="card" style="background-color:white;">
                    <div class="card-body">
                        <h4 class="card-title" th:text="#{users}"></h4>
                        <p class="card-text" th:text="#{managesection}"></p>
                        <a href="#" th:href="@{/admins/users}" class="card-link btn btn-primary">Manage</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!--Main layout-->

<!--Footer-->
    <footer th:insert="blocks/footer-admin :: footer"></footer>
</body>
</html>
